name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev

jobs:
  node:
    name: Node.js checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

  docker:
    name: Docker checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build test image
        run: docker build --target test -t mister-wolf:test .

      - name: Run checks in Docker
        run: docker run --rm mister-wolf:test
