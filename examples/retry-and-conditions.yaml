id: retry_conditions_demo
version: "0.1.0"
name: "Retry and Conditions Demo"

steps:
  - id: check_env
    type: builtin
    runner: shell
    input:
      command: "echo 'env_ok'"
    output: env_status

  - id: conditional_step
    type: builtin
    runner: echo
    when:
      var: env_status
      equals: "env_ok\n"
    input:
      message: "Environment is good"

  - id: skipped_step
    type: builtin
    runner: echo
    when:
      var: env_status
      equals: "wrong_value"
    input:
      message: "This should be skipped"

  - id: save_output
    type: builtin
    runner: echo
    input:
      message: "Workflow completed successfully"
    artifact:
      path: "results/completion.txt"
